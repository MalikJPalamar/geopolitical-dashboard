version: '3.8'

services:
  geopolitical-lens:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geopolitical-lens
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - BASE_PATH=/geopolitical-lens
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - geopolitical-network

networks:
  geopolitical-network:
    driver: bridge
